<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Mis Apps en Prueba</title>

<style>
body {

    background: #f5f7fb;

}

h1 {
    color: #1a73e8;
}

.card {
    background: white;
    max-width: 400px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);

.icono {
    font-size: 50px;
}

button {
    background: #1a73e8;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #0d5bcc;
}

a {
    text-decoration: none;
}
</style>

</head>

<body>

<div class="card">

<p>
Aplicación para registrar puntuaciones de golf.
</p>

<a href="golf.apk">
<button>Descargar APK</button>
</a>

</div>


<div class="card">

<div class="icono">🌱</div>

<p>
Guía para el cuidado y mantenimiento de plantas.
</p>
